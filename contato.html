<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Pizzaria Marcello</title>
    <link rel="icon" href="Logo-pizarria.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="hero">
            <div class="logo">
                <img src="Logo-pizarria.png" alt="Logo">
            </div>
            <div id="frase-slogan">
                <h1>Fale com o Marcello!</h1>
            </div>
        </div>
        <nav id="barra-navegacao">
            <a class='nav-botao' href="index.html">Home</a>
            <a class='nav-botao' href="Menu.html">Menu</a>
            <a class='nav-botao' href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <section id="container-main">
            <div class="form-container">
                <h2>Envie sua Mensagem</h2>
                <form id="form-contato" novalidate>
                    <div class="form-group">
                        <label for="nome">Nome Completo *</label>
                        <input type="text" id="nome" placeholder="Seu nome aqui">
                        <span class="error-message" id="erro-nome"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                        <span class="error-message" id="erro-email"></span>
                    </div>

                    <div class="form-group">
                        <label for="mensagem">Mensagem * (mín. 10 caracteres)</label>
                        <textarea id="mensagem" rows="5" placeholder="Como podemos ajudar?"></textarea>
                        <span class="error-message" id="erro-mensagem"></span>
                    </div>

                    <button type="submit" id="btn-enviar">Enviar Mensagem</button>
                </form>

                <div id="sucesso-envio" style="display:none;">
                    <h3>✅ Mensagem enviada!</h3>
                    <p>Mama Mia! Recebemos seu contato e responderemos em breve.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 MAMAMIA MARCELO</p>
    </footer>

    <script src="contato.js"></script>
</body>
</html>
